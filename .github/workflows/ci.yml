name: Three-Tier App CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Compose
      - name: Set up Docker Compose
        uses: docker/compose-action@v2

      # 3️⃣ Build and start the stack
      - name: Build and start full stack
        run: |
          # Create a lowercase network (optional but ensures k6 works)
          docker network create threetierapp_network || true
          docker-compose up -d --build

          # Wait for services to start
          echo "Waiting for middleware and backend to be ready..."
          sleep 15

      # 4️⃣ Run k6 load test
      - name: Run k6 load test
        run: |
          docker run --rm -i --network threetierapp_network \
            -v ${{ github.workspace }}/load_test.js:/load_test.js \
            grafana/k6 run /load_test.js

      # 5️⃣ Tear down stack
      - name: Tear down containers
        run: docker-compose down -v